<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Premium URL Shortener</title>
  <link rel="icon" type="image/png" href="favicon.png" />
  
  <!-- Open Graph / Facebook -->
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://premium-url-shortener.vercel.app/" />
  <meta property="og:title" content="Premium URL Shortener" />
  <meta property="og:description" content="Shorten, protect, and manage your long links instantly with modern glassmorphism UI." />
  <meta property="og:image" content="https://premium-url-shortener.vercel.app/favicon.png" />

  <!-- Twitter -->
  <meta property="twitter:card" content="summary_large_image" />
  <meta property="twitter:url" content="https://premium-url-shortener.vercel.app/" />
  <meta property="twitter:title" content="Premium URL Shortener" />
  <meta property="twitter:description" content="Shorten, protect, and manage your long links instantly." />
  <meta property="twitter:image" content="https://premium-url-shortener.vercel.app/favicon.png" />

  <link rel="stylesheet" href="style.css?v=1.1" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
</head>
<body>
  
  <main class="container">
    <div class="card glass">
      <div class="header">
        <h1>URL Shortener</h1>
        <p>Shorten, protect, and manage your long links instantly.</p>
      </div>

      <form id="shortenForm" class="form-container">
        
        <!-- URL Input & Preview -->
        <div class="input-group">
          <label for="longUrl">Original URL *</label>
          <div class="input-with-button">
            <input type="url" id="longUrl" placeholder="https://example.com/very/long/path..." required />
            <button type="button" id="previewBtn" class="secondary-btn">Preview</button>
          </div>
        </div>

        <!-- Preview Result Area -->
        <div id="previewArea" class="preview-area hidden">
          <strong id="previewTitle">Site Title</strong>
          <p id="previewDesc">Site description goes here...</p>
        </div>

        <div class="options-grid">
          <!-- Custom Code -->
          <div class="input-group">
            <label for="customCode">Custom Code</label>
            <input type="text" id="customCode" placeholder="my-custom-link" />
          </div>

          <!-- Password Protection -->
          <div class="input-group">
            <label for="password">Password</label>
            <input type="password" id="password" placeholder="Leave empty for public" />
          </div>
        </div>

        <!-- Expiration Selection -->
        <div class="input-group">
          <label for="expirySelect">Expiration</label>
          <select id="expirySelect">
            <option value="0">No Expiry</option>
            <option value="3600">1 Hour</option>
            <option value="86400">24 Hours</option>
            <option value="604800">7 Days</option>
            <option value="custom">Custom (Seconds)</option>
          </select>
        </div>

        <div class="input-group hidden" id="customExpiryGroup">
          <label for="customExpiry">Custom Expiry (Seconds)</label>
          <input type="number" id="customExpiry" placeholder="e.g. 60 for 1 minute" min="1" />
        </div>

        <button type="submit" id="submitBtn" class="primary-btn">Shorten URL</button>
      </form>

      <!-- Results Area -->
      <div id="resultArea" class="result-area hidden">
        <p class="success-text">Success! Your link is ready:</p>
        <div class="short-link-container">
          <a id="shortUrlAnchor" href="#" target="_blank">http://localhost:3000/...</a>
          <button id="copyBtn" class="copy-btn">Copy</button>
        </div>
        <div class="result-details" id="resultDetails"></div>
      </div>

      <!-- Error Area -->
      <div id="errorArea" class="error-area hidden">
        <p id="errorText">An error occurred.</p>
      </div>

    </div>
  </main>

  <script src="script.js?v=1.1"></script>
</body>
</html>
