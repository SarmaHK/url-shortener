<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Unlock Link | URL Shortener</title>
  <link rel="icon" type="image/png" href="favicon.png" />
  <link rel="stylesheet" href="style.css?v=1.1" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
</head>

<body>

  <main class="container">
    <div class="card glass unlock-card">
      <div class="header">
        <div class="lock-icon">🔒</div>
        <h1>Link Protected</h1>
        <p>This link is private. Please enter the password to continue.</p>
      </div>

      <form id="unlockForm" class="form-container">
        <div class="input-group">
          <label for="unlockPassword">Password</label>
          <input type="password" id="unlockPassword" placeholder="Enter password..." required autofocus />
        </div>

        <div id="errorArea" class="error-area hidden">
          <p id="errorText">Incorrect password. Please try again.</p>
        </div>

        <button type="submit" id="unlockBtn" class="primary-btn">Unlock Link</button>
      </form>
      
      <div class="footer-link">
        <a href="/">Create your own short links</a>
      </div>
    </div>
  </main>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const form = document.getElementById('unlockForm');
      const passwordInput = document.getElementById('unlockPassword');
      const errorArea = document.getElementById('errorArea');
      const unlockBtn = document.getElementById('unlockBtn');

      // Check if we arrived here because of a failed attempt
      // We can detect this if there was an '=' in the URL that the server didn't redirect
      // For now, we just show the prompt.

      form.addEventListener('submit', (e) => {
        e.preventDefault();
        const password = passwordInput.value.trim();
        if (!password) return;

        unlockBtn.textContent = 'Unlocking...';
        unlockBtn.disabled = true;

        // Redirect to the same path but with the password suffix
        const currentPath = window.location.pathname; // e.g. /Test1
        window.location.href = `${currentPath}=${encodeURIComponent(password)}`;
      });
    });
  </script>
</body>

</html>
